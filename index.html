<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fycash - Inteligência Financeira Real</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    html { scroll-behavior: smooth; }
    /* Previne rolagem horizontal que quebra o layout no mobile */
    body { 
      background: #050505; 
      color: white; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      overflow-x: hidden; 
      width: 100%;
    }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
    
    /* Oculta scrollbar interno do celular mockado */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion, useScroll, useTransform, AnimatePresence, useInView, useMotionValue, useSpring, useMotionTemplate } from 'framer-motion';
    import { 
      MessageCircle, Smartphone, Clock, ShieldCheck, TrendingUp, Zap, Target, Layout, ChevronRight, Menu, X, CheckCircle2, AlertCircle, Gamepad2, BellRing, ArrowRight, Wallet, LineChart, PieChart, Coins, CircleDollarSign, Send, CheckCircle
    } from 'lucide-react';

    const colors = {
      purple: '#8D5AE4',
      purpleLight: '#7c3aed',
      cyan: '#21E9CA',
      gold: '#FFB824',
      bg: '#050505',
      cardBg: 'rgba(20, 20, 25, 0.7)',
      textMain: '#FFFFFF',
      textMuted: '#A1A1AA'
    };

    const Logo = ({ className = "h-8" }) => (
      <div className={`flex items-center gap-2 ${className}`}>
        <img 
          src="https://raw.githubusercontent.com/fycashapp/lp/refs/heads/main/LOGO%201.jpeg" 
          alt="Logotipo Fycash" 
          className="h-full w-auto object-contain mix-blend-screen rounded-md"
        />
      </div>
    );

    const Button = ({ children, variant = 'primary', className = "", disabled, ...props }) => {
      const baseStyles = "relative px-6 py-3 md:px-8 md:py-4 rounded-2xl font-bold transition-all duration-300 flex items-center justify-center gap-2 overflow-hidden group text-sm md:text-base cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed";
      const variants = {
        primary: `text-black`,
        secondary: `border border-white/10 text-white hover:bg-white/5`,
        outline: `border-2 text-white`
      };

      return (
        <motion.button 
          whileHover={!disabled ? { scale: 1.03 } : {}}
          whileTap={!disabled ? { scale: 0.97 } : {}}
          className={`${baseStyles} ${variants[variant]} w-full sm:w-auto ${className}`}
          disabled={disabled}
          {...props}
        >
          {variant === 'primary' && (
            <div className="absolute inset-0 w-full h-full" style={{ background: `linear-gradient(90deg, ${colors.cyan}, #1CD0B4)` }} />
          )}
          <span className="relative z-10 flex items-center gap-2">
            {children}
            {!disabled && (
              <motion.span 
                initial={{ x: 0 }}
                whileHover={{ x: 5 }}
                className="inline-block"
              >
                <ArrowRight size={18} />
              </motion.span>
            )}
          </span>
        </motion.button>
      );
    };

    const WhatsAppMockup = ({ message, sender = "bot", time = "10:00" }) => (
      <motion.div 
        initial={{ opacity: 0, x: sender === "bot" ? -20 : 20, scale: 0.9 }}
        animate={{ opacity: 1, x: 0, scale: 1 }}
        transition={{ duration: 0.3 }}
        className={`max-w-[85%] md:max-w-[80%] p-3 md:p-4 rounded-2xl mb-3 text-xs md:text-sm shrink-0 ${
          sender === "bot" 
            ? "bg-zinc-800 text-white self-start rounded-tl-none border border-white/5" 
            : "bg-emerald-600 text-white self-end rounded-tr-none"
        }`}
      >
        <p className="leading-relaxed whitespace-pre-line">{message}</p>
        <span className="text-[9px] md:text-[10px] opacity-50 block mt-1 text-right">{time}</span>
      </motion.div>
    );

    const GlowCard = ({ children, className = "", glowColor = "rgba(33, 233, 202, 0.12)", hoverBorderClass = "hover:border-white/20" }) => {
      let mouseX = useMotionValue(0);
      let mouseY = useMotionValue(0);

      function handleMouseMove({ currentTarget, clientX, clientY }) {
        let { left, top } = currentTarget.getBoundingClientRect();
        mouseX.set(clientX - left);
        mouseY.set(clientY - top);
      }

      return (
        <div
          className={`relative group overflow-hidden rounded-[24px] md:rounded-[30px] border border-white/5 bg-zinc-900/40 backdrop-blur-sm transition-colors ${hoverBorderClass} ${className}`}
          onMouseMove={handleMouseMove}
        >
          <motion.div
            className="pointer-events-none absolute -inset-px rounded-[24px] md:rounded-[30px] opacity-0 transition duration-300 group-hover:opacity-100 hidden md:block"
            style={{
              background: useMotionTemplate`
                radial-gradient(
                  600px circle at ${mouseX}px ${mouseY}px,
                  ${glowColor},
                  transparent 80%
                )
              `,
            }}
          />
          <div className="relative z-10 w-full h-full">{children}</div>
        </div>
      );
    };

    const TiltCard = ({ children, className = "" }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const mouseXSpring = useSpring(x, { stiffness: 300, damping: 30 });
      const mouseYSpring = useSpring(y, { stiffness: 300, damping: 30 });
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["12deg", "-12deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-12deg", "12deg"]);

      const handleMouseMove = (e) => {
        if (window.innerWidth < 768) return; 
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const xPct = mouseX / width - 0.5;
        const yPct = mouseY / height - 0.5;
        x.set(xPct);
        y.set(yPct);
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
      };

      return (
        <motion.div
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{ rotateY, rotateX, transformStyle: "preserve-3d" }}
          className={`relative ${className}`}
        >
          <div style={{ transform: window.innerWidth >= 768 ? "translateZ(30px)" : "none", transformStyle: "preserve-3d" }} className="w-full h-full">
            {children}
          </div>
        </motion.div>
      );
    };

    // --- SEÇÕES PRINCIPAIS ---

    const Navbar = () => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <>
          <nav className={`fixed top-0 w-full z-50 transition-all duration-500 py-4 ${isScrolled ? 'backdrop-blur-xl border-b border-white/5 bg-black/70 py-3' : 'bg-transparent'}`}>
            <div className="container mx-auto px-6 flex justify-between items-center">
              <Logo className="h-6 md:h-8" />
              
              <div className="hidden md:flex gap-8 items-center text-sm font-medium">
                <a href="#solucao" className="hover:text-[#21E9CA] transition-colors">Solução</a>
                <a href="#como-funciona" className="hover:text-[#21E9CA] transition-colors">Como funciona</a>
                <a href="#cadastro"><Button className="py-2 px-6 text-sm">Convite VIP</Button></a>
              </div>

              <button 
                className="md:hidden text-white p-2"
                onClick={() => setIsMenuOpen(!isMenuOpen)}
              >
                {isMenuOpen ? <X /> : <Menu />}
              </button>
            </div>
          </nav>

          <AnimatePresence>
            {isMenuOpen && (
              <motion.div 
                initial={{ opacity: 0, y: -20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -20 }}
                className="fixed inset-0 z-40 bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center gap-8 md:hidden"
              >
                <a href="#solucao" onClick={() => setIsMenuOpen(false)} className="text-2xl font-bold hover:text-[#21E9CA] transition-colors">Solução</a>
                <a href="#como-funciona" onClick={() => setIsMenuOpen(false)} className="text-2xl font-bold hover:text-[#21E9CA] transition-colors">Como funciona</a>
                <div className="flex flex-col gap-4 w-3/4 mt-8">
                  <a href="#cadastro" onClick={() => setIsMenuOpen(false)} className="w-full"><Button className="w-full">Convite VIP</Button></a>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    };

    const Hero = () => {
      const { scrollYProgress } = useScroll();
      const y = useTransform(scrollYProgress, [0, 0.5], [0, 100]); 
      
      const mouseX = useMotionValue(typeof window !== 'undefined' ? window.innerWidth / 2 : 0);
      const mouseY = useMotionValue(typeof window !== 'undefined' ? window.innerHeight / 2 : 0);
      const smoothX = useSpring(mouseX, { damping: 50, stiffness: 400 });
      const smoothY = useSpring(mouseY, { damping: 50, stiffness: 400 });
      const mouseMovedRef = useRef(false);

      useEffect(() => {
        let time = 0;
        let animationFrameId;
        const animateDrift = () => {
          if (!mouseMovedRef.current || window.innerWidth < 768) {
             time += 0.005;
             const cw = window.innerWidth / 2;
             const ch = window.innerHeight / 2;
             mouseX.set(cw + Math.cos(time) * 300);
             mouseY.set(ch + Math.sin(time) * 200);
          }
          animationFrameId = requestAnimationFrame(animateDrift);
        };
        animateDrift();
        return () => cancelAnimationFrame(animationFrameId);
      }, []);

      const handleMouseMove = (e) => {
        if (window.innerWidth >= 768) {
           mouseMovedRef.current = true;
           mouseX.set(e.clientX);
           mouseY.set(e.clientY);
        }
      };

      const [messages, setMessages] = useState([
        { id: 1, sender: "bot", text: "Apenas uma reflexão: este gasto equivale a cerca de 4 horas do seu trabalho. Foi um bom investimento no seu bem-estar?", time: "10:00" },
        { id: 2, sender: "user", text: "Verdade... faz a gente pensar! Ficarei mais de olho. 👍", time: "10:01" }
      ]);
      const [isTyping, setIsTyping] = useState(false);
      const [simulated, setSimulated] = useState(false);
      const messagesEndRef = useRef(null);

      const simulateNewMessage = () => {
        if (simulated || isTyping) return;
        setSimulated(true);
        setMessages(prev => [...prev, { id: Date.now(), sender: "user", text: "Como está minha situação financeira?", time: "10:02" }]);
        
        setIsTyping(true);
        setTimeout(() => {
          setIsTyping(false);
          setMessages(prev => [...prev, {
            id: Date.now(),
            sender: "bot",
            text: "📊 **Relatório Expresso**\n\n• Entradas: R$ 4.500\n• Saídas: R$ 1.250\n• Guardado: R$ 500\n\n💡 Você tem R$ 2.750 livres. Excelente mês! Quer investir uma parte?",
            time: "10:03"
          }]);
        }, 2500);
      };

      useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages, isTyping]);

      return (
        <section 
          onMouseMove={handleMouseMove}
          className="relative h-full w-full flex flex-col pt-20 md:pt-32 pb-4 overflow-hidden bg-[#0A051A]"
        >
          <motion.div 
            className="absolute inset-0 z-0 pointer-events-none"
            style={{
              background: useMotionTemplate`
                radial-gradient(
                  ${typeof window !== 'undefined' && window.innerWidth < 768 ? '600px' : '1000px'} circle at ${smoothX}px ${smoothY}px,
                  rgba(33, 233, 202, 0.20),
                  transparent 70%
                ),
                radial-gradient(
                  ${typeof window !== 'undefined' && window.innerWidth < 768 ? '700px' : '1200px'} circle at calc(100% - ${smoothX}px) calc(100% - ${smoothY}px),
                  rgba(141, 90, 228, 0.25),
                  transparent 80%
                )
              `
            }}
          />

          <motion.div animate={{ y: [-20, 20, -20], rotate: [0, 10, 0] }} transition={{ duration: 5, repeat: Infinity, ease: "easeInOut" }} className="absolute top-[10%] left-[5%] text-white/5 opacity-40 pointer-events-none hidden md:block">
            <Wallet size={120} strokeWidth={1} />
          </motion.div>
          <motion.div animate={{ y: [15, -15, 15], rotate: [0, -5, 0] }} transition={{ duration: 7, repeat: Infinity, ease: "easeInOut" }} className="absolute top-[55%] left-[5%] text-[#21E9CA]/10 opacity-20 pointer-events-none">
            <PieChart size={80} strokeWidth={1} />
          </motion.div>
          <motion.div animate={{ y: [-30, 30, -30], rotate: [-10, 10, -10] }} transition={{ duration: 6, repeat: Infinity, ease: "easeInOut" }} className="absolute top-[20%] right-[2%] md:right-[5%] text-purple-400/10 opacity-20 pointer-events-none">
            <LineChart size={100} strokeWidth={1} />
          </motion.div>

          <div className="container mx-auto px-5 lg:px-12 grid lg:grid-cols-[1.1fr_1fr] gap-6 lg:gap-20 items-center relative z-10 flex-1">
            <motion.div 
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.6 }}
              className="text-center lg:text-left w-full mt-2 md:mt-0"
              style={{ y }}
            >
              <div className="inline-flex items-center justify-center gap-2 px-3 py-1.5 md:px-4 md:py-1.5 rounded-full bg-white/5 border border-white/10 text-[9px] md:text-xs font-bold uppercase tracking-widest mb-4 md:mb-8 text-[#21E9CA]">
                <Zap size={14} /> Inteligência Financeira Real
              </div>
              <h1 className="text-3xl sm:text-5xl lg:text-[4rem] xl:text-[4.5rem] font-black leading-[1.1] md:leading-[1.05] mb-3 md:mb-6 tracking-tight">
                Organize seu dinheiro <br className="hidden lg:block" />
                pelo <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#21E9CA] to-emerald-400">WhatsApp</span>
              </h1>
              
              <p className="text-sm sm:text-lg md:text-xl text-zinc-300 mb-5 md:mb-8 leading-relaxed font-medium max-w-sm mx-auto lg:mx-0">
                O controle financeiro no app que você já usa.
              </p>

              <div className="flex flex-wrap gap-2 md:gap-3 mb-6 md:mb-12 justify-center lg:justify-start">
                  <div className="px-3 py-2 md:px-4 md:py-2.5 rounded-xl md:rounded-2xl bg-white/5 border border-[#21E9CA]/20 text-[10px] md:text-sm font-medium backdrop-blur-md shadow-xl text-zinc-200">Sem planilhas</div>
                  <div className="px-3 py-2 md:px-4 md:py-2.5 rounded-xl md:rounded-2xl bg-white/5 border border-[#21E9CA]/20 text-[10px] md:text-sm font-medium backdrop-blur-md shadow-xl text-zinc-200">Sem complicação</div>
                  <div className="px-3 py-2 md:px-4 md:py-2.5 rounded-xl md:rounded-2xl bg-white/5 border border-[#21E9CA]/20 text-[10px] md:text-sm font-medium backdrop-blur-md shadow-xl text-zinc-200 hidden sm:block">Sem sofrimento</div>
              </div>
              
              <div className="flex justify-center lg:justify-start">
                <a href="#cadastro" className="w-full sm:w-auto block">
                  <Button className="w-full sm:px-10 py-3 md:py-4 text-sm md:text-base">Receber convite VIP</Button>
                </a>
              </div>
            </motion.div>

            <motion.div style={{ y }} className="relative flex justify-center lg:justify-end xl:justify-center z-10 w-full pb-4 md:pb-0 mt-2 md:mt-0">
              <motion.div 
                animate={{ y: [0, -10, 0] }}
                transition={{ duration: 6, repeat: Infinity, ease: "easeInOut" }}
                className="relative w-full max-w-[240px] sm:max-w-[280px] md:max-w-[340px]"
              >
                <div className="relative z-10 bg-zinc-900 border border-white/10 rounded-[30px] md:rounded-[45px] p-3 md:p-6 shadow-[0_20px_50px_rgba(0,0,0,0.5)] h-[280px] sm:h-[400px] md:h-[550px] flex flex-col overflow-hidden">
                  
                  <div className="flex items-center gap-3 border-b border-white/5 pb-2 md:pb-4 mb-2 md:mb-4 shrink-0">
                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-zinc-800 flex items-center justify-center">
                      <Logo className="h-3 md:h-4" />
                    </div>
                    <div>
                      <p className="text-xs md:text-sm font-bold">Fycash Consultor</p>
                      <p className="text-[9px] md:text-[10px] text-emerald-400 flex items-center gap-1">
                         <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" /> online
                      </p>
                    </div>
                  </div>
                  
                  <div className="flex-1 overflow-y-auto flex flex-col hide-scrollbar relative pb-2">
                    {messages.map((msg) => (
                      <WhatsAppMockup key={msg.id} message={msg.text} sender={msg.sender} time={msg.time} />
                    ))}
                    
                    {isTyping && (
                      <motion.div 
                        initial={{ opacity: 0, scale: 0.8 }} 
                        animate={{ opacity: 1, scale: 1 }} 
                        className="bg-zinc-800 self-start p-3 rounded-2xl rounded-tl-none border border-white/5 mb-3 w-16 flex gap-1 items-center justify-center shrink-0"
                      >
                        <span className="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                        <span className="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                        <span className="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                      </motion.div>
                    )}

                    {!simulated && !isTyping && (
                      <motion.div
                        initial={{ opacity: 0, scale: 0.9, y: 10 }}
                        animate={{ opacity: 1, scale: 1, y: 0 }}
                        className="self-end max-w-[90%] md:max-w-[85%] mt-2 mb-2 w-full"
                      >
                        <div className="flex flex-col items-end gap-1.5">
                          <span className="text-[8px] md:text-[9px] text-[#21E9CA] uppercase font-bold tracking-widest mr-2 animate-pulse">👆 Clique para enviar</span>
                          <button
                            onClick={simulateNewMessage}
                            className="w-full text-left bg-zinc-800/80 hover:bg-zinc-700 text-zinc-200 hover:text-white p-3 md:p-4 rounded-2xl rounded-tr-md text-[11px] md:text-sm shadow-xl border border-[#21E9CA]/40 hover:border-[#21E9CA] flex justify-between items-center gap-3 transition-all cursor-pointer group"
                          >
                            <span className="leading-relaxed font-medium">Como está minha situação financeira?</span>
                            <div className="bg-[#21E9CA]/20 group-hover:bg-[#21E9CA] text-[#21E9CA] group-hover:text-black p-2 md:p-2.5 rounded-full shrink-0 flex items-center justify-center transition-all">
                              <Send size={14} className="ml-0.5" />
                            </div>
                          </button>
                        </div>
                      </motion.div>
                    )}

                    <div ref={messagesEndRef} className="h-1 shrink-0" />
                  </div>
                </div>
              </motion.div>
            </motion.div>
          </div>
        </section>
      );
    };

    const BulletsSection = () => {
      const cards = [
        { title: "Organize seus gastos em segundos", text: "Basta uma mensagem no WhatsApp. Nada de abrir apps lentos.", icon: <Zap /> },
        { title: "Saia das dívidas com um plano claro", text: "IA que analisa seu perfil e traça a melhor rota de saída.", icon: <TrendingUp /> },
        { title: "Transforme dinheiro em tempo de vida", text: "Saiba exatamente quanto do seu tempo cada compra custa.", icon: <Clock /> },
      ];

      return (
        <section className="pt-20 pb-16 md:pt-32 md:pb-32 bg-transparent relative z-30">
          <div className="container mx-auto px-6">
            <div className="max-w-4xl mx-auto flex flex-col gap-[25vh] md:gap-[35vh]">
              {cards.map((card, idx) => (
                <motion.div 
                  key={idx}
                  initial={{ opacity: 0, y: 50 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  transition={{ type: "spring", stiffness: 100, damping: 20, delay: 0.1 }}
                  viewport={{ margin: "-50px", once: true }}
                  className="sticky origin-top"
                  style={{ top: `calc(25vh + ${idx * 24}px)`, zIndex: 10 + idx }}
                >
                  <div 
                    className="p-6 sm:p-8 md:p-12 rounded-[24px] md:rounded-[40px] border border-white/10 flex flex-col md:flex-row gap-6 md:gap-8 items-center text-center md:text-left backdrop-blur-2xl shadow-[0_-15px_40px_rgba(0,0,0,0.5)] transition-all duration-500 hover:border-[#21E9CA]/50"
                    style={{ backgroundColor: 'rgba(15, 15, 20, 0.95)' }}
                  >
                    <div className="w-16 h-16 md:w-24 md:h-24 shrink-0 rounded-2xl md:rounded-[28px] flex items-center justify-center shadow-inner border border-white/20" style={{ background: `linear-gradient(135deg, ${colors.purple}, ${colors.purpleLight})` }}>
                      {React.cloneElement(card.icon, { className: "w-8 h-8 md:w-10 md:h-10 text-white drop-shadow-md" })}
                    </div>
                    <div>
                      <h3 className="text-xl sm:text-2xl md:text-4xl font-black mb-3 md:mb-4 tracking-tight">{card.title}</h3>
                      <p className="text-zinc-300 text-sm sm:text-base md:text-xl leading-relaxed font-medium">{card.text}</p>
                    </div>
                  </div>
                </motion.div>
              ))}
            </div>

            <motion.div 
              initial={{ opacity: 0, y: 30 }} 
              whileInView={{ opacity: 1, y: 0 }} 
              className="mt-24 md:mt-32 flex justify-center relative z-40"
            >
               <a href="#cadastro" className="w-full sm:w-auto">
                 <Button className="w-full sm:w-auto px-10 py-4 md:py-5 text-lg shadow-[0_0_30px_rgba(33,233,202,0.3)]">Quero testar agora</Button>
               </a>
            </motion.div>
          </div>
        </section>
      );
    };

    const ProblemsSection = () => {

                        className="w-full bg-white/5 border border-white/10 rounded-xl md:rounded-2xl py-3 px-4 md:py-4 md:px-6 focus:outline-none focus:border-[#21E9CA] transition-colors text-sm md:text-base" 
                      />
                      
                      {status === 'error' && (
                        <p className="text-red-500 text-sm mt-2 font-medium">Ocorreu um erro ao enviar. Verifique a sua conexão.</p>
                      )}

                      <Button 
                        type="submit" 
                        disabled={status === 'loading'}
                        className="w-full py-4 md:py-5 text-lg md:text-xl mt-2"
                      >
                        {status === 'loading' ? 'Enviando...' : '🎁 Receber convite VIP'}
                      </Button>
                   </form>
                 )}
                 
                 <div className="mt-6 md:mt-8 flex flex-col sm:flex-row gap-4 md:gap-6 justify-center text-[10px] md:text-xs font-bold uppercase tracking-widest text-zinc-500">

                    <span className="flex items-center gap-2 justify-center"><Zap size={14} className="text-[#21E9CA]" /> Convites limitados</span>
                 </div>
              </div>
            </motion.div>
          </div>
        </section>
      );
    }
