<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fycash - Inteligência Financeira Real</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel (Para traduzir o JSX do React) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    html { scroll-behavior: smooth; }
    body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
  </style>

  <!-- Mapeamento de Módulos (Permite usar 'import' no navegador) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body>
  <!-- Onde o React vai ser renderizado -->
  <div id="root"></div>

  <!-- Código da Aplicação -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion, useScroll, useTransform, AnimatePresence, useInView, useMotionValue, useSpring, useMotionTemplate } from 'framer-motion';
    import { 
      MessageCircle, Smartphone, Clock, ShieldCheck, TrendingUp, Zap, Target, Layout, ChevronRight, Menu, X, CheckCircle2, AlertCircle, Gamepad2, BellRing, ArrowRight 
    } from 'lucide-react';

    // --- CONFIGURAÇÃO DE CORES (Baseado no Manual) ---
    const colors = {
      purple: '#8D5AE4',
      purpleLight: '#7c3aed',
      cyan: '#21E9CA',
      gold: '#FFB824',
      bg: '#050505',
      cardBg: 'rgba(20, 20, 25, 0.7)',
      textMain: '#FFFFFF',
      textMuted: '#A1A1AA'
    };

    // --- COMPONENTES AUXILIARES ---

    const Logo = ({ className = "h-8" }) => (
      <div className={`flex items-center gap-2 ${className}`}>
        <img 
          src="https://trello.com/1/cards/69c2ff58ee3064007330ad43/attachments/69c31c777b4038960d0768c1/download/LOGO_1.jpeg" 
          alt="Fycash Logo" 
          className="h-full w-auto object-contain mix-blend-screen rounded-md"
        />
      </div>
    );

    const Button = ({ children, variant = 'primary', className = "", ...props }) => {
      const baseStyles = "relative px-8 py-4 rounded-2xl font-bold transition-all duration-300 flex items-center justify-center gap-2 overflow-hidden group";
      const variants = {
        primary: `text-black`,
        secondary: `border border-white/10 text-white hover:bg-white/5`,
        outline: `border-2 text-white`
      };

      return (
        <motion.button 
          whileHover={{ scale: 1.03 }}
          whileTap={{ scale: 0.97 }}
          className={`${baseStyles} ${variants[variant]} ${className}`}
          {...props}
        >
          {variant === 'primary' && (
            <div className="absolute inset-0 w-full h-full" style={{ background: `linear-gradient(90deg, ${colors.cyan}, #1CD0B4)` }} />
          )}
          <span className="relative z-10 flex items-center gap-2">
            {children}
            <motion.span 
              initial={{ x: 0 }}
              whileHover={{ x: 5 }}
              className="inline-block"
            >
              <ArrowRight size={18} />
            </motion.span>
          </span>
        </motion.button>
      );
    };

    const WhatsAppMockup = ({ message, sender = "bot", time = "10:00" }) => (
      <motion.div 
        initial={{ opacity: 0, x: sender === "bot" ? -20 : 20 }}
        whileInView={{ opacity: 1, x: 0 }}
        className={`max-w-[80%] p-4 rounded-2xl mb-4 text-sm ${
          sender === "bot" 
            ? "bg-zinc-800 text-white self-start rounded-tl-none border border-white/5" 
            : "bg-emerald-600 text-white self-end rounded-tr-none"
        }`}
      >
        <p className="leading-relaxed">{message}</p>
        <span className="text-[10px] opacity-50 block mt-1 text-right">{time}</span>
      </motion.div>
    );

    const GlowCard = ({ children, className = "" }) => {
      let mouseX = useMotionValue(0);
      let mouseY = useMotionValue(0);

      function handleMouseMove({ currentTarget, clientX, clientY }) {
        let { left, top } = currentTarget.getBoundingClientRect();
        mouseX.set(clientX - left);
        mouseY.set(clientY - top);
      }

      return (
        <div
          className={`relative group overflow-hidden rounded-[30px] border border-white/5 bg-zinc-900/40 backdrop-blur-sm transition-colors hover:border-white/20 ${className}`}
          onMouseMove={handleMouseMove}
        >
          <motion.div
            className="pointer-events-none absolute -inset-px rounded-[30px] opacity-0 transition duration-300 group-hover:opacity-100"
            style={{
              background: useMotionTemplate`
                radial-gradient(
                  600px circle at ${mouseX}px ${mouseY}px,
                  rgba(33, 233, 202, 0.12),
                  transparent 80%
                )
              `,
            }}
          />
          <div className="relative z-10">{children}</div>
        </div>
      );
    };

    const TiltCard = ({ children, className = "" }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const mouseXSpring = useSpring(x, { stiffness: 300, damping: 30 });
      const mouseYSpring = useSpring(y, { stiffness: 300, damping: 30 });
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["12deg", "-12deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-12deg", "12deg"]);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const xPct = mouseX / width - 0.5;
        const yPct = mouseY / height - 0.5;
        x.set(xPct);
        y.set(yPct);
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
      };

      return (
        <motion.div
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{ rotateY, rotateX, transformStyle: "preserve-3d" }}
          className={`relative ${className}`}
        >
          <div style={{ transform: "translateZ(30px)", transformStyle: "preserve-3d" }} className="w-full h-full">
            {children}
          </div>
        </motion.div>
      );
    };

    // --- SEÇÕES PRINCIPAIS ---

    const Navbar = () => {
      const [isScrolled, setIsScrolled] = useState(false);
      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <nav className={`fixed top-0 w-full z-50 transition-all duration-500 py-4 ${isScrolled ? 'backdrop-blur-xl border-b border-white/5 bg-black/40 py-3' : ''}`}>
          <div className="container mx-auto px-6 flex justify-between items-center">
            <Logo />
            <div className="hidden md:flex gap-8 items-center text-sm font-medium">
              <a href="#solucao" className="hover:text-[#21E9CA] transition-colors">Solução</a>
              <a href="#como-funciona" className="hover:text-[#21E9CA] transition-colors">Como funciona</a>
              <Button className="py-2 px-6 text-sm" variant="secondary">Login</Button>
              <Button className="py-2 px-6 text-sm">Convite VIP</Button>
            </div>
            <button className="md:hidden text-white"><Menu /></button>
          </div>
        </nav>
      );
    };

    const Hero = () => {
      const { scrollYProgress } = useScroll();
      const y = useTransform(scrollYProgress, [0, 0.5], [0, 200]);
      const bgY1 = useTransform(scrollYProgress, [0, 1], [0, 300]);
      const bgY2 = useTransform(scrollYProgress, [0, 1], [0, -300]);

      return (
        <section className="relative min-h-screen flex items-center pt-24 overflow-hidden">
          <motion.div style={{ background: colors.purple, y: bgY1 }} className="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] rounded-full blur-[120px] opacity-20 pointer-events-none" />
          <motion.div style={{ background: colors.cyan, y: bgY2 }} className="absolute bottom-[10%] left-[-5%] w-[400px] h-[400px] rounded-full blur-[100px] opacity-10 pointer-events-none" />

          <div className="container mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <motion.div 
              initial={{ opacity: 0, y: 30 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.8 }}
            >
              <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-bold uppercase tracking-widest mb-6 text-[#21E9CA]">
                <Zap size={14} /> Inteligência Financeira Real
              </div>
              <h1 className="text-5xl md:text-7xl font-black leading-tight mb-6">
                Organize seu dinheiro pelo <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#21E9CA] to-emerald-400">WhatsApp</span>
              </h1>
              <p className="text-xl text-zinc-300 mb-8 max-w-lg leading-relaxed font-medium">
                O controle financeiro no app que você já usa. Sem planilhas, sem complicação e sem sofrimento com números.
              </p>
              
              <div className="flex flex-col sm:flex-row gap-4 mb-12">
                <Button>Receber convite VIP</Button>
                <Button variant="secondary">Ver como funciona</Button>
              </div>

              <div className="flex gap-8 text-zinc-500 text-sm">
                <span className="flex items-center gap-2"><CheckCircle2 size={16} className="text-[#21E9CA]" /> Sem planilhas</span>
                <span className="flex items-center gap-2"><CheckCircle2 size={16} className="text-[#21E9CA]" /> Sem complicação</span>
              </div>
            </motion.div>

            <motion.div style={{ y }} className="relative">
              <div className="relative z-10 bg-zinc-900 border border-white/10 rounded-[40px] p-6 shadow-2xl aspect-[9/16] w-full max-w-[320px] mx-auto overflow-hidden">
                <div className="flex items-center gap-3 border-b border-white/5 pb-4 mb-4">
                  <div className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center">
                    <Logo className="h-4" />
                  </div>
                  <div>
                    <p className="text-sm font-bold">Fycash Consultor</p>
                    <p className="text-[10px] text-emerald-400 flex items-center gap-1">
                       <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" /> online
                    </p>
                  </div>
                </div>
                
                <div className="flex flex-col h-full">
                  <WhatsAppMockup 
                    message="Boa tarde! Notei que você gastou R$ 150,00 no café hoje. ☕" 
                    sender="bot" 
                  />
                  <WhatsAppMockup 
                    message="Apenas uma reflexão: este gasto equivale a cerca de 4 horas do seu trabalho. Foi um bom investimento no seu bem-estar?" 
                    sender="bot" 
                  />
                  <WhatsAppMockup 
                    message="Verdade... faz a gente pensar! Ficarei mais de olho. 👍" 
                    sender="user" 
                  />
                  
                  <motion.div 
                    initial={{ scale: 0.8, opacity: 0 }}
                    whileInView={{ scale: 1, opacity: 1 }}
                    className="bg-white/5 border border-white/10 rounded-2xl p-4 mt-4"
                  >
                    <p className="text-[10px] text-zinc-500 uppercase font-bold mb-2">Meta Semanal</p>
                    <div className="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                      <motion.div 
                        initial={{ width: 0 }}
                        whileInView={{ width: '65%' }}
                        transition={{ duration: 1.5 }}
                        className="h-full bg-[#21E9CA]" 
                      />
                    </div>
                    <p className="text-xs mt-2 font-medium">65% do orçamento livre utilizado</p>
                  </motion.div>
                </div>
              </div>
              
              <motion.div 
                animate={{ y: [0, -10, 0] }}
                transition={{ duration: 4, repeat: Infinity }}
                className="absolute -top-10 -right-10 bg-white text-black p-4 rounded-3xl shadow-xl z-20 hidden md:block"
              >
                <p className="text-[10px] font-bold uppercase opacity-50">Economia este mês</p>
                <p className="text-2xl font-black">R$ 1.240,00</p>
              </motion.div>
            </motion.div>
          </div>
        </section>
      );
    };

    const BulletsSection = () => {
      const cards = [
        { title: "Organize seus gastos em segundos", text: "Basta uma mensagem no WhatsApp. Nada de abrir apps lentos.", icon: <Zap /> },
        { title: "Saia das dívidas com um plano claro", text: "IA que analisa seu perfil e traça a melhor rota de saída.", icon: <TrendingUp /> },
        { title: "Transforme dinheiro em tempo de vida", text: "Saiba exatamente quanto do seu tempo cada compra custa.", icon: <Clock /> },
      ];

      return (
        <section className="py-24 bg-zinc-950">
          <div className="container mx-auto px-6">
            <div className="max-w-4xl mx-auto">
              {cards.map((card, idx) => (
                <motion.div 
                  key={idx}
                  initial={{ opacity: 0, y: 50 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ margin: "-100px" }}
                  className="sticky top-24 mb-12"
                >
                  <div 
                    className="p-8 md:p-12 rounded-[40px] border border-white/10 flex flex-col md:flex-row gap-8 items-center backdrop-blur-3xl shadow-2xl transition-all duration-500 hover:border-[#21E9CA]/30"
                    style={{ backgroundColor: colors.cardBg }}
                  >
                    <div className="w-24 h-24 shrink-0 rounded-[28px] flex items-center justify-center shadow-inner border border-white/20" style={{ background: `linear-gradient(135deg, ${colors.purple}, ${colors.purpleLight})` }}>
                      {React.cloneElement(card.icon, { size: 40, className: "text-white drop-shadow-md" })}
                    </div>
                    <div>
                      <h3 className="text-2xl md:text-4xl font-black mb-4 tracking-tight">{card.title}</h3>
                      <p className="text-zinc-300 text-lg md:text-xl leading-relaxed font-medium">{card.text}</p>
                    </div>
                  </div>
                </motion.div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const ProblemsSection = () => {
      return (
        <section className="py-24 relative overflow-hidden">
          <div className="container mx-auto px-6 text-center">
            <motion.div 
              initial={{ opacity: 0 }}
              whileInView={{ opacity: 1 }}
              className="max-w-3xl mx-auto"
            >
              <h2 className="text-4xl md:text-5xl font-black mb-8">Para onde foi o seu dinheiro?</h2>
              <p className="text-xl text-zinc-300 mb-12 font-medium">No fim do mês, a sensação é sempre a mesma: Você trabalhou. Ganhou dinheiro. <span className="text-white font-bold bg-white/10 px-3 py-1.5 rounded-lg border border-white/5 ml-1">Mas ele simplesmente sumiu.</span></p>
              
              <div className="grid md:grid-cols-2 gap-6 text-left">
                {[
                  "Você não sabe quanto realmente gastou",
                  "Usa o cartão sem ter controle",
                  "Sempre acha que poderia ter guardado mais",
                  "Sente que está andando em círculos"
                ].map((item, i) => (
                  <motion.div 
                    key={i}
                    initial={{ opacity: 0, x: -20 }}
                    whileInView={{ opacity: 1, x: 0 }}
                    transition={{ delay: i * 0.1 }}
                  >
                    <GlowCard className="p-6 flex gap-4 items-center h-full">
                      <AlertCircle className="text-red-500 shrink-0" size={28} />
                      <span className="font-semibold text-lg text-zinc-100">{item}</span>
                    </GlowCard>
                  </motion.div>
                ))}
              </div>

              <motion.div 
                initial={{ scale: 0.9, opacity: 0 }}
                whileInView={{ scale: 1, opacity: 1 }}
                className="mt-16 p-8 rounded-[40px] bg-gradient-to-br from-zinc-900 to-black border border-[#21E9CA]/20"
              >
                <p className="text-2xl font-bold">👉 O problema não é quanto você ganha.</p>
                <p className="text-4xl font-black text-[#21E9CA] mt-2">É a falta de controle.</p>
              </motion.div>
            </motion.div>
          </div>
        </section>
      );
    };

    const SolutionCards = () => {
      const items = [
        { title: "Você vê para onde seu dinheiro vai", desc: "Sem esforço, tudo organizado e simples.", icon: <Target className="text-[#21E9CA]" /> },
        { title: "Você entende seus gastos", desc: "Sem planilhas, sem complicação.", icon: <TrendingUp className="text-purple-400" /> },
        { title: "Você sabe o que fazer", desc: "Um plano claro para evoluir com insights reais.", icon: <Zap className="text-yellow-400" /> }
      ];

      return (
        <section id="solucao" className="py-24 bg-zinc-950">
          <div className="container mx-auto px-6">
            <div className="text-center mb-16">
              <p className="text-[#21E9CA] font-bold uppercase tracking-widest text-xs mb-4">A Virada de Chave</p>
              <h2 className="text-4xl md:text-5xl font-black">E quando você tem controle...</h2>
              <p className="text-zinc-400 mt-4 text-xl font-medium">Tudo começa a fazer sentido.</p>
            </div>

            <div className="grid md:grid-cols-3 gap-8">
              {items.map((item, i) => (
                <motion.div 
                  key={i}
                  initial={{ opacity: 0, y: 30 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  transition={{ delay: i * 0.15 }}
                  viewport={{ once: true, margin: "-50px" }}
                  className="h-full"
                >
                  <GlowCard className="p-8 h-full">
                    <div className="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mb-6 shadow-lg border border-white/10 group-hover:scale-110 group-hover:bg-white/10 transition-all">
                      {item.icon}
                    </div>
                    <h3 className="text-2xl font-bold mb-4 text-white">{item.title}</h3>
                    <p className="text-zinc-400 leading-relaxed font-medium">{item.desc}</p>
                  </GlowCard>
                </motion.div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const Differentials = () => {
      const diffs = [
        { title: "Tudo no WhatsApp", desc: "Sem app complicado. Sem curva de aprendizado.", icon: <MessageCircle /> },
        { title: "Finanças como um jogo", desc: "Missões, níveis e evolução real para seu bolso.", icon: <Gamepad2 /> },
        { title: "Lembretes Inteligentes", desc: "Esqueceu o boleto? O Fycash te avisa antes.", icon: <BellRing /> },
        { title: "Dinheiro vira Tempo", desc: "Descubra quanto da sua vida cada gasto custa.", icon: <Clock /> },
      ];

      return (
        <section className="py-24">
          <div className="container mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">
            <div>
              <h2 className="text-4xl md:text-6xl font-black mb-12">Você não controla seu dinheiro. <span className="text-[#21E9CA]">Você evolui com ele.</span></h2>
              <div className="grid sm:grid-cols-2 gap-8">
                {diffs.map((d, i) => (
                  <motion.div 
                    key={i}
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    transition={{ delay: i * 0.1 }}
                    className="group"
                  >
                    <div className="text-[#21E9CA] mb-4 bg-[#21E9CA]/10 w-12 h-12 flex items-center justify-center rounded-xl group-hover:scale-110 transition-transform">{d.icon}</div>
                    <h4 className="font-bold text-xl mb-2 text-zinc-100">{d.title}</h4>
                    <p className="text-zinc-400 text-sm font-medium leading-relaxed">{d.desc}</p>
                  </motion.div>
                ))}
              </div>
            </div>
            <div className="relative" style={{ perspective: 1200 }}>
              <div className="absolute inset-0 bg-[#21E9CA]/20 blur-[120px] rounded-full pointer-events-none" />
              <TiltCard>
                <div className="relative z-10 bg-zinc-900 border border-white/10 rounded-[40px] p-8 shadow-2xl backdrop-blur-xl">
                  <div className="flex justify-between items-center mb-8">
                    <div>
                      <p className="text-zinc-400 text-xs font-bold uppercase tracking-wider">Patrimônio</p>
                      <p className="text-3xl font-black mt-1">R$ 42.500</p>
                    </div>
                    <div className="px-4 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold shadow-inner">
                      +12% este mês
                    </div>
                  </div>
                  {/* Gráfico Mockup */}
                  <div className="flex items-end gap-2 h-40">
                    {[40, 60, 45, 70, 85, 95, 100].map((h, i) => (
                      <motion.div 
                        key={i}
                        initial={{ height: 0 }}
                        whileInView={{ height: `${h}%` }}
                        transition={{ delay: i * 0.1, duration: 1, type: "spring" }}
                        className="flex-1 bg-gradient-to-t from-[#21E9CA]/50 to-[#21E9CA] rounded-t-lg hover:opacity-80 transition-opacity"
                      />
                    ))}
                  </div>
                  <div className="mt-8 grid grid-cols-2 gap-4">
                    <div className="p-4 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors">
                      <p className="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Próxima Missão</p>
                      <p className="font-bold text-sm text-zinc-100">Reserva de Emergência</p>
                    </div>
                    <div className="p-4 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors">
                      <p className="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Nível</p>
                      <p className="font-bold text-sm text-gold-400">Investidor Bronze</p>
                    </div>
                  </div>
                </div>
              </TiltCard>
            </div>
          </div>
        </section>
      );
    };

    const HowItWorks = () => {
      const steps = [
        { step: "1", title: "Envie seus gastos", desc: "Pelo WhatsApp ou upload automático de extrato." },
        { step: "2", title: "O app organiza tudo", desc: "Categorias, análise e visão completa sem esforço." },
        { step: "3", title: "Receba missões", desc: "Saiba onde cortar, onde guardar e como evoluir." }
      ];

      return (
        <section id="como-funciona" className="py-24 bg-zinc-950">
          <div className="container mx-auto px-6">
            <div className="text-center mb-20">
              <h2 className="text-4xl md:text-5xl font-black mb-4">Começar leva menos de 1 minuto.</h2>
              <p className="text-zinc-500">Sem burocracia, apenas resultado.</p>
            </div>
            
            <div className="grid md:grid-cols-3 gap-12">
              {steps.map((s, i) => (
                <div key={i} className="relative">
                  <span className="text-9xl font-black absolute -top-12 -left-6 opacity-5 pointer-events-none">{s.step}</span>
