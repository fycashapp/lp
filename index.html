<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fycash - Inteligência Financeira Real</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Fontes do Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    html { scroll-behavior: smooth; }
    /* Previne rolagem horizontal que quebra o layout no mobile */
    body { 
      background: #050505; 
      color: white; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      overflow-x: hidden; 
      width: 100%;
    }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion, useScroll, useTransform, AnimatePresence, useInView, useMotionValue, useSpring, useMotionTemplate } from 'framer-motion';
    import { 
      MessageCircle, Smartphone, Clock, ShieldCheck, TrendingUp, Zap, Target, Layout, ChevronRight, Menu, X, CheckCircle2, AlertCircle, Gamepad2, BellRing, ArrowRight 
    } from 'lucide-react';

    const colors = {
      purple: '#8D5AE4',
      purpleLight: '#7c3aed',
      cyan: '#21E9CA',
      gold: '#FFB824',
      bg: '#050505',
      cardBg: 'rgba(20, 20, 25, 0.7)',
      textMain: '#FFFFFF',
      textMuted: '#A1A1AA'
    };

    const Logo = ({ className = "h-8" }) => (
      <div className={`flex items-center gap-2 ${className}`}>
        <img 
          src="https://raw.githubusercontent.com/fycashapp/lp/refs/heads/main/LOGO%201.jpeg" 
          alt="Logotipo Fycash" 
          className="h-full w-auto object-contain mix-blend-screen rounded-md"
        />
      </div>
    );

    const Button = ({ children, variant = 'primary', className = "", ...props }) => {
      const baseStyles = "relative px-6 py-3 md:px-8 md:py-4 rounded-2xl font-bold transition-all duration-300 flex items-center justify-center gap-2 overflow-hidden group text-sm md:text-base cursor-pointer";
      const variants = {
        primary: `text-black`,
        secondary: `border border-white/10 text-white hover:bg-white/5`,
        outline: `border-2 text-white`
      };

      return (
        <motion.button 
          whileHover={{ scale: 1.03 }}
          whileTap={{ scale: 0.97 }}
          className={`${baseStyles} ${variants[variant]} w-full sm:w-auto ${className}`}
          {...props}
        >
          {variant === 'primary' && (
            <div className="absolute inset-0 w-full h-full" style={{ background: `linear-gradient(90deg, ${colors.cyan}, #1CD0B4)` }} />
          )}
          <span className="relative z-10 flex items-center gap-2">
            {children}
            <motion.span 
              initial={{ x: 0 }}
              whileHover={{ x: 5 }}
              className="inline-block"
            >
              <ArrowRight size={18} />
            </motion.span>
          </span>
        </motion.button>
      );
    };

    const WhatsAppMockup = ({ message, sender = "bot", time = "10:00" }) => (
      <motion.div 
        initial={{ opacity: 0, x: sender === "bot" ? -20 : 20 }}
        whileInView={{ opacity: 1, x: 0 }}
        viewport={{ once: true }}
        className={`max-w-[85%] md:max-w-[80%] p-3 md:p-4 rounded-2xl mb-3 text-xs md:text-sm ${
          sender === "bot" 
            ? "bg-zinc-800 text-white self-start rounded-tl-none border border-white/5" 
            : "bg-emerald-600 text-white self-end rounded-tr-none"
        }`}
      >
        <p className="leading-relaxed">{message}</p>
        <span className="text-[9px] md:text-[10px] opacity-50 block mt-1 text-right">{time}</span>
      </motion.div>
    );

    const GlowCard = ({ children, className = "" }) => {
      let mouseX = useMotionValue(0);
      let mouseY = useMotionValue(0);

      function handleMouseMove({ currentTarget, clientX, clientY }) {
        let { left, top } = currentTarget.getBoundingClientRect();
        mouseX.set(clientX - left);
        mouseY.set(clientY - top);
      }

      return (
        <div
          className={`relative group overflow-hidden rounded-[24px] md:rounded-[30px] border border-white/5 bg-zinc-900/40 backdrop-blur-sm transition-colors hover:border-white/20 ${className}`}
          onMouseMove={handleMouseMove}
        >
          <motion.div
            className="pointer-events-none absolute -inset-px rounded-[24px] md:rounded-[30px] opacity-0 transition duration-300 group-hover:opacity-100 hidden md:block"
            style={{
              background: useMotionTemplate`
                radial-gradient(
                  600px circle at ${mouseX}px ${mouseY}px,
                  rgba(33, 233, 202, 0.12),
                  transparent 80%
                )
              `,
            }}
          />
          <div className="relative z-10">{children}</div>
        </div>
      );
    };

    const TiltCard = ({ children, className = "" }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const mouseXSpring = useSpring(x, { stiffness: 300, damping: 30 });
      const mouseYSpring = useSpring(y, { stiffness: 300, damping: 30 });
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["12deg", "-12deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-12deg", "12deg"]);

      const handleMouseMove = (e) => {
        // Desativa o tilt em telas menores (mobile) para não interferir no scroll
        if (window.innerWidth < 768) return; 
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const xPct = mouseX / width - 0.5;
        const yPct = mouseY / height - 0.5;
        x.set(xPct);
        y.set(yPct);
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
      };

      return (
        <motion.div
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{ rotateY, rotateX, transformStyle: "preserve-3d" }}
          className={`relative ${className}`}
        >
          <div style={{ transform: window.innerWidth >= 768 ? "translateZ(30px)" : "none", transformStyle: "preserve-3d" }} className="w-full h-full">
            {children}
          </div>
        </motion.div>
      );
    };

    // --- SEÇÕES PRINCIPAIS ---

    const Navbar = () => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <>
          <nav className={`fixed top-0 w-full z-50 transition-all duration-500 py-4 ${isScrolled ? 'backdrop-blur-xl border-b border-white/5 bg-black/70 py-3' : 'bg-transparent'}`}>
            <div className="container mx-auto px-6 flex justify-between items-center">
              <Logo className="h-6 md:h-8" />
              
              {/* Desktop Menu */}
              <div className="hidden md:flex gap-8 items-center text-sm font-medium">
                <a href="#solucao" className="hover:text-[#21E9CA] transition-colors">Solução</a>
                <a href="#como-funciona" className="hover:text-[#21E9CA] transition-colors">Como funciona</a>
                <Button className="py-2 px-6 text-sm" variant="secondary">Login</Button>
                <a href="#cadastro"><Button className="py-2 px-6 text-sm">Convite VIP</Button></a>
              </div>

              {/* Mobile Menu Toggle */}
              <button 
                className="md:hidden text-white p-2"
                onClick={() => setIsMenuOpen(!isMenuOpen)}
              >
                {isMenuOpen ? <X /> : <Menu />}
              </button>
            </div>
          </nav>

          {/* Mobile Menu Overlay */}
          <AnimatePresence>
            {isMenuOpen && (
              <motion.div 
                initial={{ opacity: 0, y: -20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -20 }}
                className="fixed inset-0 z-40 bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center gap-8 md:hidden"
              >
                <a href="#solucao" onClick={() => setIsMenuOpen(false)} className="text-2xl font-bold hover:text-[#21E9CA] transition-colors">Solução</a>
                <a href="#como-funciona" onClick={() => setIsMenuOpen(false)} className="text-2xl font-bold hover:text-[#21E9CA] transition-colors">Como funciona</a>
                <div className="flex flex-col gap-4 w-3/4 mt-8">
                  <Button variant="secondary" onClick={() => setIsMenuOpen(false)}>Login</Button>
                  <a href="#cadastro" onClick={() => setIsMenuOpen(false)} className="w-full"><Button className="w-full">Convite VIP</Button></a>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    };

    const Hero = () => {
      const { scrollYProgress } = useScroll();
      // Animação de parallax sutil para os itens do Hero enquanto o card desliza por cima
      const y = useTransform(scrollYProgress, [0, 0.5], [0, 100]); 
      
      // Movimento do mouse para o background interativo
      const mouseX = useMotionValue(typeof window !== 'undefined' ? window.innerWidth / 2 : 0);
      const mouseY = useMotionValue(typeof window !== 'undefined' ? window.innerHeight / 2 : 0);
      
      const smoothX = useSpring(mouseX, { damping: 50, stiffness: 400 });
      const smoothY = useSpring(mouseY, { damping: 50, stiffness: 400 });

      useEffect(() => {
        mouseX.set(window.innerWidth / 2);
        mouseY.set(window.innerHeight / 2);
      }, []);

      const handleMouseMove = (e) => {
        mouseX.set(e.clientX);
        mouseY.set(e.clientY);
      };

      return (
        <section 
          onMouseMove={handleMouseMove}
          className="relative h-full w-full flex items-center pt-20 md:pt-28 pb-10 overflow-hidden bg-[#0A051A]"
        >
          {/* Degrade interativo baseado na arte */}
          <motion.div 
            className="absolute inset-0 z-0 pointer-events-none"
            style={{
              background: useMotionTemplate`
                radial-gradient(
                  1000px circle at ${smoothX}px ${smoothY}px,
                  rgba(33, 233, 202, 0.25),
                  transparent 70%
                ),
                radial-gradient(
                  1200px circle at calc(100% - ${smoothX}px) calc(100% - ${smoothY}px),
                  rgba(141, 90, 228, 0.3),
                  transparent 80%
                )
              `
            }}
          />

          <div className="container mx-auto px-6 grid md:grid-cols-2 gap-12 lg:gap-16 items-center relative z-10">
            <motion.div 
              initial={{ opacity: 0, y: 30 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.8 }}
              className="text-center md:text-left"
              style={{ y }} // Parallax interno
            >
              <div className="inline-flex items-center justify-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-6 text-[#21E9CA]">
                <Zap size={14} /> Inteligência Financeira Real
              </div>
              <h1 className="text-4xl sm:text-5xl lg:text-7xl font-black leading-[1.1] mb-6">
                Organize seu dinheiro pelo <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#21E9CA] to-emerald-400">WhatsApp</span>
              </h1>
              
              <p className="text-lg md:text-xl text-zinc-300 mb-6 max-w-lg mx-auto md:mx-0 leading-relaxed font-medium">
                O controle financeiro no app que você já usa.
              </p>

              {/* Tópicos Flutuantes */}
              <div className="flex flex-wrap gap-3 mb-10 justify-center md:justify-start">
                  <motion.div animate={{y: [0, -6, 0]}} transition={{duration: 4, repeat: Infinity, ease: "easeInOut"}} className="px-4 py-2 rounded-2xl bg-white/5 border border-[#21E9CA]/20 text-xs md:text-sm font-medium backdrop-blur-md shadow-xl text-zinc-200">Sem planilhas</motion.div>
                  <motion.div animate={{y: [0, -8, 0]}} transition={{duration: 4, repeat: Infinity, delay: 1, ease: "easeInOut"}} className="px-4 py-2 rounded-2xl bg-white/5 border border-[#21E9CA]/20 text-xs md:text-sm font-medium backdrop-blur-md shadow-xl text-zinc-200">Sem complicação</motion.div>
                  <motion.div animate={{y: [0, -5, 0]}} transition={{duration: 4, repeat: Infinity, delay: 2, ease: "easeInOut"}} className="px-4 py-2 rounded-2xl bg-white/5 border border-[#21E9CA]/20 text-xs md:text-sm font-medium backdrop-blur-md shadow-xl text-zinc-200">Sem sofrimento</motion.div>
              </div>
              
              <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                <a href="#cadastro" className="w-full sm:w-auto">
                  <Button className="w-full">Receber convite VIP</Button>
                </a>
              </div>
            </motion.div>

            <motion.div style={{ y }} className="relative mt-4 md:mt-0">
              <div className="relative z-10 bg-zinc-900 border border-white/10 rounded-[30px] md:rounded-[40px] p-5 md:p-6 shadow-[0_0_50px_rgba(0,0,0,0.5)] aspect-[9/16] w-full max-w-[260px] sm:max-w-[300px] md:max-w-[320px] mx-auto overflow-hidden">
                <div className="flex items-center gap-3 border-b border-white/5 pb-4 mb-4">
                  <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-zinc-800 flex items-center justify-center">
                    <Logo className="h-3 md:h-4" />
                  </div>
                  <div>
                    <p className="text-xs md:text-sm font-bold">Fycash Consultor</p>
                    <p className="text-[9px] md:text-[10px] text-emerald-400 flex items-center gap-1">
                       <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" /> online
                    </p>
                  </div>
                </div>
                
                <div className="flex flex-col h-full">
                  <WhatsAppMockup 
                    message="Boa tarde! Notei que você gastou R$ 150,00 no café hoje. ☕" 
                    sender="bot" 
                  />
                  <WhatsAppMockup 
                    message="Apenas uma reflexão: este gasto equivale a cerca de 4 horas do seu trabalho. Foi um bom investimento no seu bem-estar?" 
                    sender="bot" 
                  />
                  <WhatsAppMockup 
                    message="Verdade... faz a gente pensar! Ficarei mais de olho. 👍" 
                    sender="user" 
                  />
                  
                  <motion.div 
                    initial={{ scale: 0.8, opacity: 0 }}
                    whileInView={{ scale: 1, opacity: 1 }}
                    className="bg-white/5 border border-white/10 rounded-2xl p-3 md:p-4 mt-auto md:mt-4"
                  >
                    <p className="text-[9px] md:text-[10px] text-zinc-500 uppercase font-bold mb-2">Meta Semanal</p>
                    <div className="w-full bg-zinc-800 h-1.5 md:h-2 rounded-full overflow-hidden">
                      <motion.div 
                        initial={{ width: 0 }}
                        whileInView={{ width: '65%' }}
                        transition={{ duration: 1.5 }}
                        className="h-full bg-[#21E9CA]" 
                      />
                    </div>
                    <p className="text-[10px] md:text-xs mt-2 font-medium">65% do orçamento livre utilizado</p>
                  </motion.div>
                </div>
              </div>
              
              <motion.div 
                animate={{ y: [0, -10, 0] }}
                transition={{ duration: 4, repeat: Infinity }}
                className="absolute -top-6 -right-4 md:-top-10 md:-right-10 bg-white text-black p-3 md:p-4 rounded-2xl md:rounded-3xl shadow-xl z-20"
              >
                <p className="text-[8px] md:text-[10px] font-bold uppercase opacity-50">Economia este mês</p>
                <p className="text-lg md:text-2xl font-black">R$ 1.240,00</p>
              </motion.div>
            </motion.div>
          </div>
        </section>
      );
    };

    const BulletsSection = () => {
      const cards = [
        { title: "Organize seus gastos em segundos", text: "Basta uma mensagem no WhatsApp. Nada de abrir apps lentos.", icon: <Zap /> },
        { title: "Saia das dívidas com um plano claro", text: "IA que analisa seu perfil e traça a melhor rota de saída.", icon: <TrendingUp /> },
        { title: "Transforme dinheiro em tempo de vida", text: "Saiba exatamente quanto do seu tempo cada compra custa.", icon: <Clock /> },
      ];

      return (
        <section className="pt-20 pb-16 md:pt-32 md:pb-24 bg-transparent relative z-30">
          <div className="container mx-auto px-6">
            <div className="max-w-4xl mx-auto">
              {cards.map((card, idx) => (
                <motion.div 
                  key={idx}
                  initial={{ opacity: 0, scale: 0.8, y: 150, rotateX: 45 }}
                  whileInView={{ opacity: 1, scale: 1, y: 0, rotateX: 0 }}
                  transition={{ type: "spring", stiffness: 120, damping: 20, bounce: 0.5, delay: idx * 0.1 }}
                  viewport={{ margin: "-50px", once: false }}
                  className="md:sticky mb-8 md:mb-12 origin-top"
                  style={{ top: `calc(120px + ${idx * 30}px)`, zIndex: idx, perspective: 1000 }}
                >
                  <div 
                    className="p-6 sm:p-8 md:p-12 rounded-[24px] md:rounded-[40px] border border-white/10 flex flex-col md:flex-row gap-6 md:gap-8 items-center text-center md:text-left backdrop-blur-3xl shadow-2xl transition-all duration-500 md:hover:border-[#21E9CA]/30"
                    style={{ backgroundColor: colors.cardBg }}
                  >
                    <div className="w-16 h-16 md:w-24 md:h-24 shrink-0 rounded-2xl md:rounded-[28px] flex items-center justify-center shadow-inner border border-white/20" style={{ background: `linear-gradient(135deg, ${colors.purple}, ${colors.purpleLight})` }}>
                      {React.cloneElement(card.icon, { className: "w-8 h-8 md:w-10 md:h-10 text-white drop-shadow-md" })}
                    </div>
                    <div>
                      <h3 className="text-xl sm:text-2xl md:text-4xl font-black mb-3 md:mb-4 tracking-tight">{card.title}</h3>
                      <p className="text-zinc-300 text-sm sm:text-base md:text-xl leading-relaxed font-medium">{card.text}</p>
                    </div>
                  </div>
                </motion.div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const ProblemsSection = () => {
      return (
        <section className="py-16 md:py-24 relative overflow-hidden bg-transparent">
          <div className="container mx-auto px-6 text-center">
            <motion.div 
              initial={{ opacity: 0 }}
              whileInView={{ opacity: 1 }}
              className="max-w-3xl mx-auto"
            >
              <h2 className="text-3xl md:text-5xl font-black mb-6 md:mb-8 leading-tight">Para onde foi o seu dinheiro?</h2>
              <p className="text-lg md:text-xl text-zinc-300 mb-10 md:mb-12 font-medium leading-relaxed">
                No fim do mês, a sensação é sempre a mesma: Você trabalhou. Ganhou dinheiro. 
                <span className="inline-block mt-2 md:mt-0 text-red-500 font-bold bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20 md:ml-2 shadow-[0_0_15px_rgba(239,68,68,0.3)]">Mas ele simplesmente sumiu.</span>
              </p>
              
              <div className="grid sm:grid-cols-2 gap-4 md:gap-6 text-left">
                {[
                  "Você não sabe quanto realmente gastou",
                  "Usa o cartão sem ter controle",
                  "Sempre acha que poderia ter guardado mais",
                  "Sente que está andando em círculos"
                ].map((item, i) => (
                  <motion.div 
                    key={i}
                    initial={{ opacity: 0, x: -20 }}
                    whileInView={{ opacity: 1, x: 0 }}
                    transition={{ delay: i * 0.1 }}
                  >
                    <GlowCard className="p-5 md:p-6 flex gap-4 items-center h-full">
                      <AlertCircle className="text-red-500 shrink-0" size={24} />
                      <span className="font-semibold text-base md:text-lg text-zinc-100">{item}</span>
                    </GlowCard>
                  </motion.div>
                ))}
              </div>

              {/* Animação dramática da frase */}
              <motion.div 
                initial={{ scale: 0.8, opacity: 0, y: 50, rotateZ: -3 }}
                whileInView={{ scale: 1, opacity: 1, y: 0, rotateZ: 0 }}
                transition={{ type: "spring", stiffness: 150, damping: 15 }}
                className="mt-16 md:mt-24 p-8 md:p-14 rounded-[30px] md:rounded-[50px] bg-gradient-to-br from-zinc-900 to-black border border-[#21E9CA]/30 shadow-[0_0_50px_rgba(33,233,202,0.15)] relative overflow-hidden group"
              >
                <motion.div animate={{ opacity: [0.2, 0.4, 0.2] }} transition={{ duration: 3, repeat: Infinity }} className="absolute inset-0 bg-gradient-to-r from-[#21E9CA]/10 to-transparent pointer-events-none" />
                <p className="text-xl md:text-3xl font-bold text-zinc-300 relative z-10 mb-4 transition-transform group-hover:translate-x-2">👉 O problema não é quanto você ganha.</p>
                <p className="text-4xl md:text-6xl font-black text-[#21E9CA] mt-2 relative z-10 drop-shadow-[0_0_20px_rgba(33,233,202,0.4)] transition-transform group-hover:translate-x-2">É a falta de controle.</p>
              </motion.div>
            </motion.div>
          </div>
        </section>
      );
    };

    const TransitionSection = () => {
      return (
        <section className="py-32 md:py-48 relative flex items-center justify-center overflow-hidden bg-black border-t border-b border-white/5">
          {/* Brilho de fundo animado */}
          <div className="absolute inset-0 flex justify-center items-center opacity-30 pointer-events-none">
             <motion.div 
                animate={{ scale: [1, 1.1, 1], opacity: [0.3, 0.5, 0.3] }}
                transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }}
                className="w-[300px] md:w-[600px] h-[300px] md:h-[600px] bg-[#21E9CA] blur-[150px] md:blur-[250px] rounded-[100%]" 
             />
          </div>
          
          <motion.div 
            initial={{ opacity: 0, scale: 0.8, y: 50, filter: "blur(10px)" }}
            whileInView={{ opacity: 1, scale: 1, y: 0, filter: "blur(0px)" }}
            transition={{ duration: 0.8, type: "spring", bounce: 0.4 }}
            viewport={{ once: false, margin: "-100px" }}
            className="text-center relative z-10 px-6"
          >
            <motion.div 
               initial={{ opacity: 0, y: -20 }}
               whileInView={{ opacity: 1, y: 0 }}
               transition={{ delay: 0.2 }}
               className="inline-block px-4 py-1.5 rounded-full bg-[#21E9CA]/10 border border-[#21E9CA]/30 text-[#21E9CA] font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] text-xs md:text-sm mb-6 md:mb-8 shadow-[0_0_20px_rgba(33,233,202,0.2)]"
            >
